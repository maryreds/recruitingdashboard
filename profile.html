<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recruiter Profile — JSM Consulting</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Inter:wght@300..700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary":"#001e52","primary-container":"#00327d","primary-fixed":"#dae2ff","primary-fixed-dim":"#b1c5ff",
            "secondary":"#b6171e","secondary-container":"#da3433","secondary-fixed":"#ffdad6",
            "surface":"#f7f9fb","surface-container":"#eceef0","surface-container-low":"#f2f4f6",
            "surface-container-high":"#e6e8ea","surface-container-highest":"#e0e3e5","surface-container-lowest":"#ffffff",
            "on-surface":"#191c1e","on-surface-variant":"#434651","outline":"#747782",
            "on-primary":"#ffffff","on-secondary":"#ffffff","on-primary-container":"#7d9eee",
            "error":"#ba1a1a","background":"#f7f9fb"
          },
          fontFamily: {
            headline: ["Manrope","sans-serif"],
            body: ["Inter","sans-serif"]
          }
        }
      }
    };
  </script>
</head>
<body class="bg-background font-body text-on-surface min-h-screen">

  <!-- Header -->
  <header class="fixed top-0 inset-x-0 z-50 h-20 bg-white/80 backdrop-blur-xl border-b border-surface-container-high flex items-center px-4 sm:px-6 lg:px-8">
    <div class="flex items-center gap-3">
      <a href="index.html" class="text-2xl font-headline font-extrabold text-primary tracking-tight">JSM</a>
    </div>
    <nav class="hidden md:flex items-center gap-1 ml-8">
      <a href="index.html" class="px-4 py-2 rounded-xl text-sm font-medium text-on-surface-variant hover:bg-surface-container-low transition-colors">Dashboard</a>
      <a href="gallery.html" class="px-4 py-2 rounded-xl text-sm font-medium bg-primary-fixed text-primary transition-colors">Team Gallery</a>
    </nav>
    <div class="ml-auto flex items-center gap-2">
      <a href="gallery.html" class="p-2 rounded-xl hover:bg-surface-container-low transition-colors" title="Back to Gallery">
        <span class="material-symbols-outlined text-on-surface-variant">arrow_back</span>
      </a>
      <button class="p-2 rounded-xl hover:bg-surface-container-low transition-colors relative">
        <span class="material-symbols-outlined text-on-surface-variant">notifications</span>
      </button>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="fixed top-20 left-0 bottom-0 w-72 bg-white border-r border-surface-container-high hidden lg:flex flex-col z-40">
    <div class="p-6 border-b border-surface-container-high">
      <div class="flex items-center gap-3">
        <div class="h-10 w-10 rounded-xl bg-primary flex items-center justify-center">
          <span class="text-on-primary font-headline font-bold text-sm">JSM</span>
        </div>
        <div>
          <p class="font-headline font-bold text-sm text-on-surface">JSM Consulting</p>
          <p class="text-xs text-on-surface-variant">Recruiter Intelligence</p>
        </div>
      </div>
    </div>
    <nav class="flex-1 p-4 space-y-1">
      <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-medium text-on-surface-variant hover:bg-surface-container-low transition-colors">
        <span class="material-symbols-outlined text-[20px]">dashboard</span>Dashboard
      </a>
      <a href="gallery.html" class="flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-medium bg-primary-fixed text-primary transition-colors">
        <span class="material-symbols-outlined text-[20px]">groups</span>Team Gallery
      </a>
      <a href="analytics.html" class="flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-medium text-on-surface-variant hover:bg-surface-container-low transition-colors">
        <span class="material-symbols-outlined text-[20px]">analytics</span>Analytics
      </a>
      <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-medium text-on-surface-variant hover:bg-surface-container-low transition-colors">
        <span class="material-symbols-outlined text-[20px]">strategy</span>Team Strategy
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="lg:ml-72 pt-28 px-4 sm:px-6 lg:px-8 pb-28">
    <div id="profile-content">
      <!-- Loading Skeleton -->
      <div class="animate-pulse space-y-8">
        <div class="rounded-3xl bg-surface-container-low p-8">
          <div class="flex flex-col sm:flex-row items-center gap-6">
            <div class="h-32 w-32 rounded-full bg-surface-container-high"></div>
            <div class="space-y-3 flex-1 text-center sm:text-left">
              <div class="h-8 w-64 bg-surface-container-high rounded-xl mx-auto sm:mx-0"></div>
              <div class="h-4 w-48 bg-surface-container-high rounded-lg mx-auto sm:mx-0"></div>
              <div class="h-4 w-36 bg-surface-container-high rounded-lg mx-auto sm:mx-0"></div>
            </div>
          </div>
          <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mt-8">
            <div class="h-20 bg-surface-container-high rounded-2xl"></div>
            <div class="h-20 bg-surface-container-high rounded-2xl"></div>
            <div class="h-20 bg-surface-container-high rounded-2xl"></div>
            <div class="h-20 bg-surface-container-high rounded-2xl"></div>
          </div>
        </div>
        <div class="h-40 bg-surface-container-low rounded-3xl"></div>
        <div class="grid grid-cols-12 gap-6">
          <div class="col-span-12 lg:col-span-5 h-72 bg-surface-container-low rounded-3xl"></div>
          <div class="col-span-12 lg:col-span-7 h-72 bg-surface-container-low rounded-3xl"></div>
        </div>
        <div class="h-48 bg-surface-container-low rounded-3xl"></div>
        <div class="h-48 bg-surface-container-low rounded-3xl"></div>
      </div>
    </div>
  </main>

  <!-- Mobile Bottom Nav -->
  <nav class="md:hidden fixed bottom-0 inset-x-0 bg-white border-t border-surface-container-high z-50">
    <div class="flex items-center justify-around h-16">
      <a href="index.html" class="flex flex-col items-center gap-0.5 text-on-surface-variant">
        <span class="material-symbols-outlined text-[22px]">dashboard</span>
        <span class="text-[10px] font-medium">Dashboard</span>
      </a>
      <a href="gallery.html" class="flex flex-col items-center gap-0.5 text-primary">
        <span class="material-symbols-outlined text-[22px]">groups</span>
        <span class="text-[10px] font-medium">Gallery</span>
      </a>
      <a href="analytics.html" class="flex flex-col items-center gap-0.5 text-on-surface-variant">
        <span class="material-symbols-outlined text-[22px]">analytics</span>
        <span class="text-[10px] font-medium">Analytics</span>
      </a>
      <a href="#" class="flex flex-col items-center gap-0.5 text-on-surface-variant">
        <span class="material-symbols-outlined text-[22px]">settings</span>
        <span class="text-[10px] font-medium">Settings</span>
      </a>
    </div>
  </nav>

  <script>
    const PHOTOS = {
      'Rahul Kanojiya': 'img/rahul.png',
      'Shaily Juneja': 'img/shaily.png',
      'Sahithya Mogalapu': 'img/sahithya.png',
      'Akash Nair': 'img/akash.png',
      'Santoshi Hegde': 'img/santoshi.png',
      'Vishal Khatri': 'img/vishal.png',
      'Shubham Kenjale': 'img/shubham.png',
      'Rutuja Pande': 'img/rutuja.png',
      'Treesa Tijo': 'img/treesa.png',
      'Vivek Shenoy': 'img/vivek.png',
      'Shreerang Tarte': 'img/shreerang.png',
    };

    const LINKEDIN = {
      'Rahul Kanojiya': 'https://www.linkedin.com/in/rahul-kanojiya-55821b113/',
      'Shaily Juneja': 'https://www.linkedin.com/in/shaily-juneja-659290100',
      'Santoshi Hegde': 'https://in.linkedin.com/in/santoshi-hegde-5389a44',
      'Vishal Khatri': 'https://www.linkedin.com/in/vishal-khatri-92756984/',
      'Treesa Tijo': 'https://www.linkedin.com/in/treesatijo',
      'Vivek Shenoy': 'https://www.linkedin.com/in/vivek-s-6b186232/',
      'Shreerang Tarte': 'https://www.linkedin.com/in/shreerang-tarte-2632652/',
    };

    const INITIALS_COLORS = [
      '#001e52','#00327d','#b6171e','#da3433','#0d6e3f','#7c4dff','#e65100','#00838f','#4a148c','#1b5e20','#bf360c'
    ];

    function getInitialsColor(name) {
      let hash = 0;
      for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
      return INITIALS_COLORS[Math.abs(hash) % INITIALS_COLORS.length];
    }

    function getInitials(name) {
      return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function groupByDate(timeline) {
      const groups = {};
      timeline.forEach(entry => {
        const key = entry.date || 'Unknown';
        if (!groups[key]) groups[key] = [];
        groups[key].push(entry);
      });
      return groups;
    }

    function renderProfile(recruiter, allRecruiters, totals) {
      const r = recruiter;
      const photo = PHOTOS[r.name];
      const linkedin = LINKEDIN[r.name];
      const conversion = r.interviewConversion != null ? r.interviewConversion : (r.submittals > 0 ? Math.round((r.interviews / r.submittals) * 100) : 0);

      // Determine badge
      let badgeHtml = '';
      const maxInterviews = Math.max(...allRecruiters.map(x => x.interviews || 0));
      const minTTS = Math.min(...allRecruiters.filter(x => x.avgTTS > 0).map(x => x.avgTTS));
      if (r.name.includes('Rahul')) {
        badgeHtml = '<span class="inline-flex items-center gap-1 px-3 py-1 rounded-full bg-primary text-on-primary text-xs font-semibold"><span class="material-symbols-outlined text-[14px]">star</span>Team Lead</span>';
      } else if (r.interviews > 0 && r.interviews === maxInterviews) {
        badgeHtml = '<span class="inline-flex items-center gap-1 px-3 py-1 rounded-full bg-secondary text-on-secondary text-xs font-semibold"><span class="material-symbols-outlined text-[14px]">emoji_events</span>Top Performer</span>';
      } else if (r.avgTTS > 0 && r.avgTTS === minTTS) {
        badgeHtml = '<span class="inline-flex items-center gap-1 px-3 py-1 rounded-full bg-secondary text-on-secondary text-xs font-semibold"><span class="material-symbols-outlined text-[14px]">bolt</span>Fastest</span>';
      }

      // Avatar
      let avatarHtml;
      if (photo) {
        avatarHtml = `<div class="relative"><img src="${photo}" alt="${r.name}" class="h-32 w-32 rounded-full ring-4 ring-white shadow-xl object-cover"/><div class="absolute bottom-1 right-1 h-5 w-5 bg-green-500 rounded-full border-[3px] border-white"></div></div>`;
      } else {
        const color = getInitialsColor(r.name);
        avatarHtml = `<div class="relative"><div class="h-32 w-32 rounded-full ring-4 ring-white shadow-xl flex items-center justify-center text-3xl font-headline font-bold text-white" style="background:${color}">${getInitials(r.name)}</div><div class="absolute bottom-1 right-1 h-5 w-5 bg-green-500 rounded-full border-[3px] border-white"></div></div>`;
      }

      // LinkedIn button
      const linkedinSvg = `<svg class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>`;
      const linkedinHtml = linkedin ? `<a href="${linkedin}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-[#0A66C2] text-white text-sm font-medium hover:bg-[#004182] transition-colors">${linkedinSvg} LinkedIn Profile</a>` : '';

      // Role description
      const roleDesc = r.isCore ? 'Core Team Recruiter' : 'Extended Team Recruiter';

      // Stat pills
      const statPills = `
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mt-8">
          <div class="bg-white/70 backdrop-blur rounded-2xl p-4 text-center">
            <p class="text-2xl font-headline font-extrabold text-primary">${r.submittals}</p>
            <p class="text-xs text-on-surface-variant font-medium mt-1">Submittals</p>
          </div>
          <div class="bg-white/70 backdrop-blur rounded-2xl p-4 text-center">
            <p class="text-2xl font-headline font-extrabold text-primary">${r.interviews}</p>
            <p class="text-xs text-on-surface-variant font-medium mt-1">Interviews</p>
          </div>
          <div class="bg-white/70 backdrop-blur rounded-2xl p-4 text-center">
            <p class="text-2xl font-headline font-extrabold text-primary">${conversion}%</p>
            <p class="text-xs text-on-surface-variant font-medium mt-1">Conversion</p>
          </div>
          <div class="bg-white/70 backdrop-blur rounded-2xl p-4 text-center">
            <p class="text-2xl font-headline font-extrabold text-error">${r.rejections}</p>
            <p class="text-xs text-on-surface-variant font-medium mt-1">Rejections</p>
          </div>
        </div>`;

      // Profile header
      const headerSection = `
        <div class="rounded-3xl bg-gradient-to-br from-primary-fixed via-white to-surface-container-low p-8 shadow-sm">
          <div class="flex flex-col sm:flex-row items-center gap-6">
            ${avatarHtml}
            <div class="text-center sm:text-left space-y-2">
              <h1 class="text-3xl sm:text-4xl font-headline font-extrabold text-primary">${r.name}</h1>
              <div class="flex flex-wrap items-center justify-center sm:justify-start gap-2">
                <span class="text-sm text-on-surface-variant">${roleDesc}</span>
                ${badgeHtml}
              </div>
              <div class="flex flex-wrap items-center justify-center sm:justify-start gap-3 pt-1">
                ${linkedinHtml}
              </div>
            </div>
          </div>
          ${statPills}
        </div>`;

      // Client Coverage
      const clientCards = (r.clients || []).map((c, i) => `
        <div class="flex-shrink-0 w-56 bg-white rounded-2xl border border-surface-container-high p-5 hover:shadow-md transition-shadow">
          <div class="flex items-center gap-3 mb-3">
            <div class="h-10 w-10 rounded-xl bg-primary-fixed flex items-center justify-center">
              <span class="material-symbols-outlined text-primary text-[20px]">apartment</span>
            </div>
            <span class="inline-flex items-center justify-center min-w-[24px] h-6 px-2 rounded-full bg-primary text-on-primary text-xs font-bold">${c.count}</span>
          </div>
          <p class="font-headline font-bold text-sm text-on-surface truncate">${c.name}</p>
          <p class="text-xs text-on-surface-variant mt-1">${i === 0 ? 'Primary Client' : 'Active Client'}</p>
        </div>`).join('');

      const clientSection = (r.clients && r.clients.length > 0) ? `
        <div class="col-span-12 rounded-3xl bg-white border border-surface-container-high p-6 shadow-sm">
          <h2 class="text-lg font-headline font-bold text-on-surface mb-4 flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">business</span>
            Client Coverage & Focus
          </h2>
          <div class="flex gap-4 overflow-x-auto pb-2 -mx-1 px-1">${clientCards}</div>
        </div>` : '';

      // Donut Chart
      const total = r.submittals || 1;
      const submitted = Math.max(0, (r.submittals || 0) - (r.interviews || 0) - (r.rejections || 0));
      const interviewed = r.interviews || 0;
      const rejected = r.rejections || 0;
      const s1 = (submitted / total) * 100;
      const s2 = (interviewed / total) * 100;
      const s3 = (rejected / total) * 100;
      const offset1 = 25;
      const offset2 = offset1 - s1;
      const offset3 = offset2 - s2;

      const uniqueReasons = [...new Set((r.rejectionDetails || []).map(d => d.reason).filter(Boolean))];
      const reasonTags = uniqueReasons.map(reason => `<span class="inline-block px-2.5 py-1 rounded-lg bg-red-50 text-error text-xs font-medium">${reason}</span>`).join('');

      const donutSection = `
        <div class="col-span-12 lg:col-span-5 rounded-3xl bg-white border border-surface-container-high p-6 shadow-sm">
          <h2 class="text-lg font-headline font-bold text-on-surface mb-4 flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">donut_large</span>
            Candidate Quality
          </h2>
          <div class="flex flex-col items-center">
            <svg viewBox="0 0 42 42" class="w-44 h-44">
              <circle cx="21" cy="21" r="15.915" fill="none" stroke="#dae2ff" stroke-width="4"/>
              ${s1 > 0 ? `<circle cx="21" cy="21" r="15.915" fill="none" stroke="#001e52" stroke-width="4" stroke-dasharray="${s1} ${100-s1}" stroke-dashoffset="${offset1}" stroke-linecap="round"/>` : ''}
              ${s2 > 0 ? `<circle cx="21" cy="21" r="15.915" fill="none" stroke="#22c55e" stroke-width="4" stroke-dasharray="${s2} ${100-s2}" stroke-dashoffset="${offset2}" stroke-linecap="round"/>` : ''}
              ${s3 > 0 ? `<circle cx="21" cy="21" r="15.915" fill="none" stroke="#ba1a1a" stroke-width="4" stroke-dasharray="${s3} ${100-s3}" stroke-dashoffset="${offset3}" stroke-linecap="round"/>` : ''}
              <text x="21" y="19.5" text-anchor="middle" class="text-[5px] font-bold fill-on-surface" font-family="Manrope,sans-serif">${r.submittals}</text>
              <text x="21" y="24" text-anchor="middle" class="text-[2.5px] fill-on-surface-variant" font-family="Inter,sans-serif">Total</text>
            </svg>
            <div class="flex flex-wrap justify-center gap-4 mt-4 text-xs">
              <div class="flex items-center gap-1.5"><span class="h-3 w-3 rounded-full bg-primary"></span>Submitted ${submitted}</div>
              <div class="flex items-center gap-1.5"><span class="h-3 w-3 rounded-full bg-green-500"></span>Interviewed ${interviewed}</div>
              <div class="flex items-center gap-1.5"><span class="h-3 w-3 rounded-full bg-error"></span>Rejected ${rejected}</div>
            </div>
            ${uniqueReasons.length > 0 ? `<div class="mt-4 pt-4 border-t border-surface-container-high w-full"><p class="text-xs font-semibold text-on-surface-variant mb-2">Rejection Drivers</p><div class="flex flex-wrap gap-1.5">${reasonTags}</div></div>` : ''}
          </div>
        </div>`;

      // Activity Timeline
      const sortedTimeline = [...(r.timeline || [])].sort((a, b) => new Date(b.date) - new Date(a.date));
      const grouped = groupByDate(sortedTimeline);
      let timelineContent = '';
      for (const [date, entries] of Object.entries(grouped)) {
        timelineContent += `<div class="mb-4"><p class="text-xs font-semibold text-on-surface-variant mb-2">${formatDate(date)}</p>`;
        entries.forEach(e => {
          let dotColor, statusBadge;
          const st = (e.status || '').toLowerCase();
          if (st === 'interview' || st === 'interviewed') {
            dotColor = 'bg-green-500';
            statusBadge = `<span class="px-2 py-0.5 rounded-full bg-green-100 text-green-700 text-[10px] font-semibold">Interview</span>`;
          } else if (st === 'submitted') {
            dotColor = 'bg-primary';
            statusBadge = `<span class="px-2 py-0.5 rounded-full bg-primary-fixed text-primary text-[10px] font-semibold">Submitted</span>`;
          } else if (st === 'rejected') {
            dotColor = 'bg-outline';
            statusBadge = `<span class="px-2 py-0.5 rounded-full bg-red-50 text-error text-[10px] font-semibold">Rejected</span>`;
          } else if (st === 'hired') {
            dotColor = 'bg-green-600';
            statusBadge = `<span class="px-2 py-0.5 rounded-full bg-green-100 text-green-800 text-[10px] font-semibold">Hired</span>`;
          } else {
            dotColor = 'bg-outline';
            statusBadge = `<span class="px-2 py-0.5 rounded-full bg-surface-container text-on-surface-variant text-[10px] font-semibold">${e.status || 'Unknown'}</span>`;
          }
          const detail = st === 'rejected' && e.reason ? `<p class="text-[10px] text-on-surface-variant mt-0.5">Reason: ${e.reason}</p>` :
                          (st === 'interview' || st === 'interviewed') && e.interviewDate ? `<p class="text-[10px] text-on-surface-variant mt-0.5">Interview: ${formatDate(e.interviewDate)}</p>` : '';
          timelineContent += `
            <div class="flex items-start gap-3 py-2">
              <div class="mt-1.5 h-2.5 w-2.5 rounded-full ${dotColor} flex-shrink-0"></div>
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-on-surface truncate">${e.candidate || 'Unknown'}</p>
                <p class="text-xs text-on-surface-variant truncate">${e.role || ''}${e.client ? ' @ ' + e.client : ''}</p>
                ${detail}
              </div>
              ${statusBadge}
            </div>`;
        });
        timelineContent += '</div>';
      }

      const timelineSection = `
        <div class="col-span-12 lg:col-span-7 rounded-3xl bg-white border border-surface-container-high p-6 shadow-sm">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-headline font-bold text-on-surface flex items-center gap-2">
              <span class="material-symbols-outlined text-primary">timeline</span>
              Activity Timeline
            </h2>
            <span class="px-2.5 py-1 rounded-full bg-primary-fixed text-primary text-xs font-semibold">Last 14 Days</span>
          </div>
          <div class="max-h-80 overflow-y-auto pr-1">
            ${timelineContent || '<p class="text-sm text-on-surface-variant">No recent activity</p>'}
          </div>
        </div>`;

      // Performance Insights
      const strengths = [];
      if (r.submittals > 0) strengths.push(`${r.submittals} submittals this period`);
      if (r.interviews > 0) strengths.push(`${r.interviews} interviews secured \u2014 ${conversion}% conversion rate`);
      if (r.uniqueCompanies > 1) strengths.push(`Coverage across ${r.uniqueCompanies} distinct clients`);
      if (r.daysActive > 3) strengths.push(`Consistent activity \u2014 active ${r.daysActive} of 14 days`);
      if (r.avgTTS != null && r.avgTTS > 0 && r.avgTTS < 3) strengths.push(`Fast response time \u2014 ${r.avgTTS} days average time-to-submittal`);
      if (r.avgBillRate) strengths.push(`Targeting roles at $${r.avgBillRate}/hr average bill rate`);

      const growth = [];
      if (r.rejections > 0) growth.push(`${r.rejections} rejection(s) \u2014 review client feedback patterns`);
      if (r.interviews === 0) growth.push('No interviews yet \u2014 focus on candidate-job alignment');
      if (r.hires === 0) growth.push('No hires yet \u2014 push pipeline to offer stage');
      if (r.avgTTS != null && r.avgTTS > 4) growth.push(`Time-to-submittal (${r.avgTTS} days) above team average \u2014 look for faster sourcing paths`);
      if (r.uniqueCompanies === 1) growth.push('Concentrated on single client \u2014 consider diversifying');

      const strengthItems = strengths.map(s => `<li class="flex items-start gap-2"><span class="material-symbols-outlined text-primary text-[18px] mt-0.5">check_circle</span><span class="text-sm text-on-surface">${s}</span></li>`).join('');
      const growthItems = growth.map(g => `<li class="flex items-start gap-2"><span class="material-symbols-outlined text-outline text-[18px] mt-0.5">info</span><span class="text-sm text-on-surface">${g}</span></li>`).join('');

      const insightsSection = `
        <div class="col-span-12 grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="rounded-3xl bg-white border border-surface-container-high border-l-4 border-l-primary p-6 shadow-sm">
            <h3 class="text-base font-headline font-bold text-on-surface mb-3 flex items-center gap-2">
              <span class="material-symbols-outlined text-primary">trending_up</span>Strengths
            </h3>
            <ul class="space-y-2.5">${strengthItems || '<li class="text-sm text-on-surface-variant">No data yet</li>'}</ul>
          </div>
          <div class="rounded-3xl bg-white border border-surface-container-high border-l-4 border-l-outline p-6 shadow-sm">
            <h3 class="text-base font-headline font-bold text-on-surface mb-3 flex items-center gap-2">
              <span class="material-symbols-outlined text-outline">lightbulb</span>Areas for Growth
            </h3>
            <ul class="space-y-2.5">${growthItems || '<li class="text-sm text-on-surface-variant">Looking great \u2014 no areas flagged</li>'}</ul>
          </div>
        </div>`;

      // Key Metrics Comparison
      const avgSubmittals = allRecruiters.length > 0 ? (allRecruiters.reduce((a, x) => a + (x.submittals || 0), 0) / allRecruiters.length) : 0;
      const avgInterviews = allRecruiters.length > 0 ? (allRecruiters.reduce((a, x) => a + (x.interviews || 0), 0) / allRecruiters.length) : 0;
      const avgConversion = allRecruiters.length > 0 ? (allRecruiters.reduce((a, x) => a + (x.interviewConversion || (x.submittals > 0 ? Math.round((x.interviews / x.submittals) * 100) : 0)), 0) / allRecruiters.length) : 0;

      const maxVal = Math.max(r.submittals, avgSubmittals, r.interviews, avgInterviews, 1);
      const maxConv = Math.max(conversion, avgConversion, 1);

      function barPair(label, recruiterVal, teamVal, maxV) {
        const rw = Math.max(4, (recruiterVal / maxV) * 100);
        const tw = Math.max(4, (teamVal / maxV) * 100);
        return `
          <div class="space-y-2">
            <p class="text-sm font-medium text-on-surface">${label}</p>
            <div class="space-y-1.5">
              <div class="flex items-center gap-3">
                <span class="text-xs text-on-surface-variant w-16 text-right">${r.name.split(' ')[0]}</span>
                <div class="flex-1 bg-surface-container-low rounded-full h-5 overflow-hidden">
                  <div class="h-full bg-primary rounded-full flex items-center justify-end pr-2" style="width:${rw}%">
                    <span class="text-[10px] text-on-primary font-bold">${typeof recruiterVal === 'number' && recruiterVal % 1 !== 0 ? recruiterVal.toFixed(1) : recruiterVal}</span>
                  </div>
                </div>
              </div>
              <div class="flex items-center gap-3">
                <span class="text-xs text-on-surface-variant w-16 text-right">Team Avg</span>
                <div class="flex-1 bg-surface-container-low rounded-full h-5 overflow-hidden">
                  <div class="h-full bg-outline/40 rounded-full flex items-center justify-end pr-2" style="width:${tw}%">
                    <span class="text-[10px] text-on-surface-variant font-bold">${typeof teamVal === 'number' && teamVal % 1 !== 0 ? teamVal.toFixed(1) : teamVal}</span>
                  </div>
                </div>
              </div>
            </div>
          </div>`;
      }

      const comparisonSection = `
        <div class="col-span-12 rounded-3xl bg-white border border-surface-container-high p-6 shadow-sm">
          <h2 class="text-lg font-headline font-bold text-on-surface mb-6 flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">bar_chart</span>
            Key Metrics Comparison
          </h2>
          <div class="space-y-6">
            ${barPair('Submittals', r.submittals, avgSubmittals, maxVal)}
            ${barPair('Interviews', r.interviews, avgInterviews, maxVal)}
            ${barPair('Conversion %', conversion, avgConversion, maxConv)}
          </div>
        </div>`;

      // Back link
      const backLink = `
        <div class="mt-8">
          <a href="gallery.html" class="inline-flex items-center gap-2 text-sm font-medium text-primary hover:text-primary-container transition-colors">
            <span class="material-symbols-outlined text-[18px]">arrow_back</span>
            Back to Team Gallery
          </a>
        </div>`;

      // Assemble
      document.getElementById('profile-content').innerHTML = `
        ${headerSection}
        <div class="grid grid-cols-12 gap-6 mt-8">
          ${clientSection}
          ${donutSection}
          ${timelineSection}
          ${insightsSection}
          ${comparisonSection}
        </div>
        ${backLink}
      `;
    }

    function renderNotFound(name) {
      document.getElementById('profile-content').innerHTML = `
        <div class="rounded-3xl bg-white border border-surface-container-high p-12 text-center shadow-sm">
          <span class="material-symbols-outlined text-[64px] text-outline mb-4">person_off</span>
          <h2 class="text-2xl font-headline font-bold text-on-surface mb-2">Recruiter not found</h2>
          <p class="text-on-surface-variant mb-6">No recruiter matching "${name}" was found in the system.</p>
          <a href="gallery.html" class="inline-flex items-center gap-2 px-6 py-3 rounded-2xl bg-primary text-on-primary font-medium hover:bg-primary-container transition-colors">
            <span class="material-symbols-outlined text-[18px]">arrow_back</span>
            Back to Team Gallery
          </a>
        </div>`;
    }

    async function loadProfile() {
      const params = new URLSearchParams(window.location.search);
      const nameQuery = (params.get('name') || '').trim().toLowerCase();

      if (!nameQuery) {
        renderNotFound('');
        return;
      }

      try {
        const res = await fetch('/api/data');
        const data = await res.json();

        const allRecruiters = [
          ...(data.coreTeam?.recruiters || []),
          ...(data.extendedTeam?.recruiters || [])
        ];

        const recruiter = allRecruiters.find(r => {
          const firstName = r.name.split(' ')[0].toLowerCase();
          return firstName.includes(nameQuery) || nameQuery.includes(firstName);
        });

        if (!recruiter) {
          renderNotFound(nameQuery);
          return;
        }

        document.title = `${recruiter.name} \u2014 JSM Consulting`;
        renderProfile(recruiter, allRecruiters, data.totals || {});
      } catch (err) {
        console.error('Failed to load profile data:', err);
        document.getElementById('profile-content').innerHTML = `
          <div class="rounded-3xl bg-white border border-surface-container-high p-12 text-center shadow-sm">
            <span class="material-symbols-outlined text-[64px] text-error mb-4">error</span>
            <h2 class="text-2xl font-headline font-bold text-on-surface mb-2">Failed to load data</h2>
            <p class="text-on-surface-variant mb-6">Could not fetch recruiter data. Please try again.</p>
            <button onclick="loadProfile()" class="inline-flex items-center gap-2 px-6 py-3 rounded-2xl bg-primary text-on-primary font-medium hover:bg-primary-container transition-colors">
              <span class="material-symbols-outlined text-[18px]">refresh</span>Retry
            </button>
          </div>`;
      }
    }

    // Initial load
    loadProfile();

    // Auto-refresh every 15 minutes
    setInterval(loadProfile, 15 * 60 * 1000);
  </script>
</body>
</html>
